{% load static %}
<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Espace Ramez — Administration{% endblock %}</title>
  <link rel="stylesheet" href="{% static 'portal/css/app.css' %}">
  {% block extra_head %}{% endblock %}
</head>
<body class="{% block body_class %}{% endblock %}">
  <div class="shell">
    {% if messages %}
      <div id="toast-stack" style="position:fixed; top:16px; right:16px; z-index:9999; display:grid; gap:10px; max-width:min(420px, calc(100vw - 32px));">
        {% for message in messages %}
          <div
            class="toast"
            data-toast
            style="
              padding:12px 14px;
              border-radius:14px;
              border:1px solid rgba(229,231,235,1);
              background:#fff;
              box-shadow:0 18px 50px rgba(0,0,0,0.14);
              color:#0f172a;
              font-weight:700;
              font-size:14px;
            "
          >
            {{ message }}
          </div>
        {% endfor %}
      </div>
      <script>
        (function () {
          const toasts = document.querySelectorAll("[data-toast]");
          toasts.forEach((t, i) => {
            const delay = 2600 + i * 200;
            setTimeout(() => {
              t.style.transition = "opacity 250ms ease, transform 250ms ease";
              t.style.opacity = "0";
              t.style.transform = "translateY(-6px)";
              setTimeout(() => t.remove(), 300);
            }, delay);
          });
        })();
      </script>
    {% endif %}
    {% block content %}{% endblock %}
  </div>
</body>
</html>
